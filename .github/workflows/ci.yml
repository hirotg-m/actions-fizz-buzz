name: Continuous Integration
on: push

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Set Node.js 21.x
        uses: actions/setup-node@v4
        with:
          node-version: 21.x
      - name: Install dependencies
        run: node --version
        run: npm ci
      - name: Test
        run: npm test
      - name: hello
        run: echo "Hello, World!"
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Set Node.js 21.x
        uses: actions/setup-node@v4
        with:
          node-version: 21.x
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
